	<body>
		<div class="container mt-5">

			<div class="row mb-3 mx-auto">
				<div class="col">
					<h2 class="pubs">Photography</h2>
					<p><a href="index.html">← Back</a></p>
				</div>

			<hr>

			<!-- =============================================
			     PHOTO GRID
			     To add a photo, copy one <div class="photo-item"> block
			     and update: src, alt, location, and date.
			     ============================================= -->
			<div class="photo-grid">

				<!-- PHOTO: Grand Canyon -->
				<div class="photo-item">
					<img src="img/gc.jpg" alt="Grand Canyon" class="photo-img">
					<div class="photo-location">Grand Canyon</div>
					<div class="photo-date">March 2023 · Arizona</div>
				</div>

				<!-- PHOTO: Gothic Basin -->
				<div class="photo-item">
					<img src="img/gothic_basin.jpg" alt="Gothic Basin" class="photo-img">
					<div class="photo-location">Alpine Lakes Wilderness</div>
					<div class="photo-date">July 2022 · Washington</div>
				</div>

				<div class="photo-item">
					<img src="img/iceland.jpg" alt="Iceland" class="photo-img">
					<div class="photo-location">Iceland</div>
					<div class="photo-date">August 2021 · Iceland </div>
				</div>
				
				<div class="photo-item">
					<img src="img/tetons.jpg" alt="Grand Tetons" class="photo-img">
					<div class="photo-location">Grand Tetons</div>
					<div class="photo-date">August 2021 · Wyoming </div>
				</div>

				<!-- ADD MORE PHOTOS HERE — copy the block below and fill in the fields:
				<div class="photo-item">
					<img src="img/YOUR_FILE.jpg" alt="DESCRIPTION" class="photo-img">
					<div class="photo-location">LOCATION NAME</div>
					<div class="photo-date">MONTH YEAR · PLACE</div>

			</div>
